<body>
     <h1>Время в городах</h1>
    <main>
        <div class="item">
            <p class="item_title">Москва:</p>
            <p class="item_moscow"></p>
        </div>
        <div class="item">
            <p class="item_title">Лондон:</p>
            <p class="item_london"></p>
        </div>
        <div class="item">
            <p class="item_title">Нью-Йорк:</p>

        </div>
    </main>
    <cards></cards>
    <slider>
        <button class="left_btn">&larr;</button>
        <div class="container">
            <div class="slider">
                <img src="img/1.jpg" alt="1">
                <img src="img/2.jpg" alt="2">
                <img src="img/3.jpg" alt="3">
            </div>
        </div>
        <button class="right_btn">&rarr;</button>
    </slider>
        
    <finder>
        <div class="container">
            <p class="result">Введите любое число</p>
            <input type="text" name="num" id="num">
            <div class="div">
                <button class="btn_result">Результат</button>
            </div>
            <div class="trying">
                <p></p>
        </div>
        </div>
    </finder>
